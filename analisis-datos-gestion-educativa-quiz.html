<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Análisis de Datos y Gestión Educativa — Test</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #080b12;
    --surface: #0f1420;
    --surface2: #161d2e;
    --border: #1e2a40;
    --text: #e8edf5;
    --muted: #5a6a85;
    --accent: #4f7cff;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 50% at 20% 20%, rgba(16,185,129,0.07) 0%, transparent 70%),
      radial-gradient(ellipse 50% 40% at 80% 80%, rgba(6,182,212,0.06) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  .wrap {
    position: relative;
    z-index: 1;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 2rem 1rem;
  }

  #screen-menu { width: 100%; max-width: 520px; }

  .logo-block {
    text-align: center;
    margin-bottom: 2.5rem;
    animation: fadeDown .5s ease both;
  }
  .logo-icon {
    width: 64px; height: 64px;
    background: linear-gradient(135deg, #10b981, #06b6d4);
    border-radius: 18px;
    display: inline-flex; align-items: center; justify-content: center;
    font-size: 2rem;
    margin-bottom: 1rem;
    box-shadow: 0 0 40px rgba(16,185,129,0.25);
  }
  .logo-block h1 {
    font-family: 'Syne', sans-serif;
    font-size: 1.6rem;
    font-weight: 800;
    letter-spacing: -0.02em;
    color: #fff;
  }
  .logo-block p {
    color: var(--muted);
    font-size: .85rem;
    margin-top: .4rem;
  }

  .unit-list { display: flex; flex-direction: column; gap: .6rem; margin-bottom: 1rem; }

  .unit-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: .9rem 1.1rem;
    cursor: pointer;
    display: flex; align-items: center; gap: .9rem;
    transition: border-color .2s, transform .15s, background .2s;
    animation: fadeUp .4s ease both;
    text-align: left;
    width: 100%;
  }
  .unit-btn:hover { border-color: #2d3f60; background: var(--surface2); transform: translateY(-1px); }
  .unit-btn:active { transform: scale(.99); }

  .unit-pill {
    width: 4px; min-width: 4px; height: 40px;
    border-radius: 99px;
  }
  .unit-info { flex: 1; min-width: 0; }
  .unit-name {
    font-family: 'Syne', sans-serif;
    font-size: .9rem; font-weight: 700; color: #fff;
  }
  .unit-sub { font-size: .75rem; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: .15rem; }
  .unit-count { font-size: .75rem; color: var(--muted); white-space: nowrap; }
  .unit-arrow { color: var(--muted); font-size: 1rem; }

  .mega-btn {
    width: 100%;
    padding: 1.1rem 1.4rem;
    border-radius: 16px;
    border: none;
    cursor: pointer;
    font-family: 'Syne', sans-serif;
    font-size: 1rem; font-weight: 700;
    color: #fff;
    background: linear-gradient(135deg, #10b981 0%, #06b6d4 100%);
    box-shadow: 0 8px 30px rgba(16,185,129,0.28);
    display: flex; align-items: center; justify-content: space-between;
    transition: opacity .2s, transform .15s;
    animation: fadeUp .4s .35s ease both;
  }
  .mega-btn:hover { opacity: .92; transform: translateY(-1px); }
  .mega-btn:active { transform: scale(.99); }
  .mega-left { display: flex; align-items: center; gap: .75rem; }
  .mega-left span:first-child { font-size: 1.4rem; }
  .mega-title { font-size: 1rem; }
  .mega-sub { font-size: .75rem; font-weight: 400; opacity: .75; }

  #screen-quiz { width: 100%; max-width: 520px; }

  .quiz-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 1rem;
    animation: fadeDown .3s ease both;
  }
  .back-btn {
    background: none; border: 1px solid var(--border);
    border-radius: 8px; padding: .4rem .8rem;
    color: var(--muted); font-size: .8rem; cursor: pointer;
    transition: color .15s, border-color .15s;
    font-family: 'DM Sans', sans-serif;
  }
  .back-btn:hover { color: var(--text); border-color: #2d3f60; }

  .unit-tag {
    font-size: .7rem; font-weight: 600; padding: .3rem .7rem;
    border-radius: 99px; letter-spacing: .05em;
  }
  .counter { font-size: .8rem; color: var(--muted); }

  .progress-bar {
    height: 3px; background: var(--border); border-radius: 99px;
    margin-bottom: 1.2rem; overflow: hidden;
    animation: fadeDown .3s .1s ease both;
  }
  .progress-fill {
    height: 100%; border-radius: 99px;
    transition: width .5s cubic-bezier(.4,0,.2,1);
  }

  .score-chip {
    display: inline-flex; align-items: center; gap: .4rem;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 99px; padding: .3rem .8rem;
    font-size: .8rem; color: var(--text);
    margin-bottom: 1.2rem;
    animation: fadeDown .3s .15s ease both;
  }
  .score-chip .star { color: #f59e0b; }

  .question-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 1.4rem;
    margin-bottom: 1.1rem;
    animation: fadeUp .3s .1s ease both;
  }
  .question-card p {
    font-size: .97rem; line-height: 1.6; color: var(--text);
  }

  .options { display: flex; flex-direction: column; gap: .55rem; margin-bottom: 1.2rem; }

  .opt-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: .9rem 1rem;
    cursor: pointer;
    display: flex; align-items: center; gap: .75rem;
    transition: border-color .15s, background .15s, transform .1s;
    text-align: left; width: 100%;
    animation: fadeUp .3s ease both;
  }
  .opt-btn:hover:not(.disabled) { border-color: #2d3f60; background: var(--surface2); transform: translateY(-1px); }
  .opt-btn:active:not(.disabled) { transform: scale(.99); }
  .opt-btn.disabled { cursor: default; }

  .opt-btn.correct {
    background: rgba(16,185,129,0.12);
    border-color: #10b981;
  }
  .opt-btn.wrong {
    background: rgba(239,68,68,0.1);
    border-color: #ef4444;
  }
  .opt-btn.faded { opacity: .4; }

  .opt-letter {
    width: 28px; height: 28px; min-width: 28px;
    border-radius: 50%; border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-size: .75rem; font-family: 'Syne', sans-serif; font-weight: 700;
    color: var(--muted);
    transition: background .2s, border-color .2s, color .2s;
  }
  .opt-btn.correct .opt-letter { background: #10b981; border-color: #10b981; color: #fff; }
  .opt-btn.wrong .opt-letter { background: #ef4444; border-color: #ef4444; color: #fff; }

  .opt-text { font-size: .85rem; line-height: 1.4; color: var(--text); }
  .opt-btn.faded .opt-text { color: var(--muted); }

  .feedback-box {
    border-radius: 12px; padding: .8rem 1rem;
    display: flex; align-items: flex-start; gap: .6rem;
    font-size: .85rem; line-height: 1.4;
    animation: fadeUp .2s ease both;
    margin-bottom: .8rem;
  }
  .feedback-box.ok { background: rgba(16,185,129,0.1); border: 1px solid rgba(16,185,129,0.3); color: #6ee7b7; }
  .feedback-box.fail { background: rgba(239,68,68,0.08); border: 1px solid rgba(239,68,68,0.3); color: #fca5a5; }
  .feedback-icon { font-size: 1rem; flex-shrink: 0; }

  .next-btn {
    width: 100%;
    padding: .9rem;
    border-radius: 12px;
    border: none;
    cursor: pointer;
    font-family: 'Syne', sans-serif; font-size: .95rem; font-weight: 700;
    color: #fff;
    transition: opacity .2s, transform .1s;
    animation: fadeUp .25s ease both;
  }
  .next-btn:hover { opacity: .88; }
  .next-btn:active { transform: scale(.99); }

  #screen-results { width: 100%; max-width: 420px; text-align: center; }

  .result-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 2.5rem 2rem;
    margin-bottom: 1.2rem;
    animation: fadeUp .4s ease both;
  }
  .result-emoji { font-size: 3.5rem; margin-bottom: 1rem; }
  .result-title {
    font-family: 'Syne', sans-serif;
    font-size: 1.4rem; font-weight: 800; color: #fff;
    margin-bottom: .3rem;
  }
  .result-sub { font-size: .82rem; color: var(--muted); margin-bottom: 1.5rem; }
  .result-pct {
    font-family: 'Syne', sans-serif;
    font-size: 5rem; font-weight: 800;
    line-height: 1;
    margin-bottom: .3rem;
  }
  .result-score { font-size: .85rem; color: var(--muted); margin-bottom: 1.5rem; }
  .result-bar {
    height: 8px; background: var(--border); border-radius: 99px; overflow: hidden;
  }
  .result-bar-fill {
    height: 100%; border-radius: 99px;
    transition: width 1s cubic-bezier(.4,0,.2,1);
  }

  .result-actions { display: flex; flex-direction: column; gap: .7rem; animation: fadeUp .4s .1s ease both; }

  .btn-outline {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    padding: .9rem;
    border-radius: 12px;
    cursor: pointer;
    font-family: 'Syne', sans-serif; font-size: .9rem; font-weight: 700;
    transition: background .15s, border-color .15s;
  }
  .btn-outline:hover { background: var(--surface2); border-color: #2d3f60; }

  .screen { display: none; }
  .screen.active { display: block; }

  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-12px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .unit-btn:nth-child(1) { animation-delay: .05s }
  .unit-btn:nth-child(2) { animation-delay: .10s }
  .unit-btn:nth-child(3) { animation-delay: .15s }
  .unit-btn:nth-child(4) { animation-delay: .20s }
  .unit-btn:nth-child(5) { animation-delay: .25s }
  .unit-btn:nth-child(6) { animation-delay: .30s }

  .opt-btn:nth-child(1) { animation-delay: .05s }
  .opt-btn:nth-child(2) { animation-delay: .10s }
  .opt-btn:nth-child(3) { animation-delay: .15s }
  .opt-btn:nth-child(4) { animation-delay: .20s }
</style>
</head>
<body>
<div class="wrap">

  <!-- MENU -->
  <div id="screen-menu" class="screen active">
    <div class="logo-block">
      <div class="logo-icon">📊</div>
      <h1>Análisis de Datos y Gestión Educativa</h1>
      <p>Elige un tema para practicar o pon a prueba todos los contenidos</p>
    </div>
    <div class="unit-list" id="unit-list"></div>
    <button class="mega-btn" onclick="startQuiz('Todas')">
      <div class="mega-left">
        <span>⚡</span>
        <div>
          <div class="mega-title">Test Completo</div>
          <div class="mega-sub">60 preguntas · Todas las unidades</div>
        </div>
      </div>
      <span>→</span>
    </button>
  </div>

  <!-- QUIZ -->
  <div id="screen-quiz" class="screen">
    <div class="quiz-header">
      <button class="back-btn" onclick="goMenu()">← Menú</button>
      <span class="unit-tag" id="quiz-tag"></span>
      <span class="counter" id="quiz-counter"></span>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
    <div class="score-chip"><span class="star">★</span> <span id="score-chip">0 correctas</span></div>
    <div class="question-card"><p id="question-text"></p></div>
    <div class="options" id="options"></div>
    <div id="feedback"></div>
    <button class="next-btn" id="next-btn" style="display:none" onclick="nextQuestion()"></button>
  </div>

  <!-- RESULTS -->
  <div id="screen-results" class="screen">
    <div class="result-card">
      <div class="result-emoji" id="res-emoji"></div>
      <div class="result-title" id="res-title"></div>
      <div class="result-sub" id="res-sub"></div>
      <div class="result-pct" id="res-pct"></div>
      <div class="result-score" id="res-score"></div>
      <div class="result-bar"><div class="result-bar-fill" id="res-bar"></div></div>
    </div>
    <div class="result-actions">
      <button class="next-btn" id="replay-btn" onclick="replayQuiz()">🔄 Repetir este test</button>
      <button class="btn-outline" onclick="goMenu()">← Volver al menú principal</button>
    </div>
  </div>

</div>

<script>
const ALL_QUESTIONS = {
  "Unidad 1": [
    {q:"En el ejemplo de EDM para la detección temprana del fracaso escolar, ¿qué característica es esencial para el modelo predictivo?",o:["Se apoya en un análisis estadístico a partir de observaciones del tutor, sin modelos computacionales.","Rechaza cualquier tipo de transformación de datos, puesto que las variables deben utilizarse exactamente en el formato en que fueron recogidas.","Se basa en información recogida del profesorado y su opinión sobre el alumnado sin recurrir a registros históricos cuantitativos.","Integra datos procedentes de múltiples fuentes (calificaciones, asistencia, datos socioeconómicos, trazas del aula virtual) tras un preprocesamiento riguroso para identificar patrones asociados al abandono."],a:3},
    {q:"¿Cuál de las siguientes afirmaciones describe mejor la aportación específica de la Ciencia de Datos Educativos (EDS)?",o:["Aplica técnicas de minería de datos al contexto educativo, con la ventaja de no necesitar teoría pedagógica explícita.","Integra tecnología, pedagogía y ética para extraer conocimiento accionable de los datos educativos y transformar ese conocimiento en decisiones que mejoren la enseñanza y el aprendizaje.","Se centra en automatizar decisiones sobre el alumnado, reduciendo la carga de trabajo del profesorado que pasa a supervisión técnica.","Tiene como finalidad principal sustituir los métodos tradicionales de evaluación por sistemas algorítmicos más fiables."],a:1},
    {q:"En el proceso KDD, ¿qué conjunto de actividades pertenece íntegramente a la fase de preprocesamiento?",o:["Selección de técnicas y algoritmos, entrenamiento y visualización de resultados.","Selección de analíticas, informe y visualización de resultados.","Limpieza de datos, integración de datos, selección de datos y transformación de datos.","Anonimización, integridad, análisis descriptivo y predictivo."],a:2},
    {q:"¿Cuál de las siguientes afirmaciones refleja con mayor fidelidad el concepto de huella digital en educación?",o:["La huella digital en educación se compone de calificaciones y resultados de pruebas estandarizadas y otra información de interacción con recursos digitales de aprendizaje.","La huella digital se compone de datos demográficos y socioeconómicos del alumnado, almacenados en sistemas de gestión de información institucionales.","La huella digital incluye datos biométricos y de análisis de sentimiento, con gran potencial para los procesos analíticos educativos.","La huella digital es el rastro de datos que deja la actividad del individuo en entornos tecnológicos, cuya acumulación masiva posibilita el uso de técnicas de IA y ciencia de datos para obtener información."],a:3},
    {q:"¿Qué rasgo clave define el enfoque Data-Driven de Chris Anderson presentado en la unidad?",o:["La idea de que el Big Data solo es útil en ciencias experimentales y no resulta aplicable a contextos humanistas.","La defensa de que la correlación puede reemplazar a la causalidad, prescindiendo de marcos teóricos previos gracias a la disponibilidad masiva de datos.","La afirmación de que los modelos teóricos son imprescindibles incluso cuando se dispone de grandes volúmenes de datos y alta capacidad computacional.","La propuesta de que las Analíticas de Aprendizaje deben basarse exclusivamente en métodos cualitativos y no en datos masivos."],a:1},
    {q:"¿Cuál de las siguientes afirmaciones recoge mejor la lógica de las Analíticas de Aprendizaje (LA) y el papel de sus actores?",o:["El propósito principal de las LA es generar informes para mejorar el rendimiento del alumnado en las pruebas estandarizadas.","Las LA son posibles gracias a los datos, pero están guiadas por decisiones humanas, orientadas a optimizar el aprendizaje del estudiante, la práctica docente y la gestión educativa mediante intervenciones informadas.","Las LA conforman el pilar de la gobernanza digital e interesan únicamente a los gestores institucionales que interpretan los datos y toman decisiones.","Las LA automatizan la toma de decisiones, apoyando al profesorado y a los gestores educativos con evidencias basadas en datos."],a:1},
    {q:"¿Cuál de las siguientes afirmaciones describe mejor la relación entre AIED, EDM y LA?",o:["LA se orienta al entrenamiento de algoritmos, EDM a contrastar teorías pedagógicas y AIED a sistemas conversacionales.","EDM diseña tutores inteligentes, AIED se limita a describir datos históricos y LA se ocupa de la gestión institucional.","AIED y LA son términos equivalentes, mientras que EDM se ocupa del desarrollo de plataformas de aprendizaje adaptativo basado en datos.","AIED se centra en sistemas inteligentes (como tutores), EDM en desarrollar métodos computacionales para explorar datos educativos, y LA en aplicar esos patrones y modelos para comprender y optimizar el aprendizaje."],a:3},
    {q:"Según el MRCDD, ¿cuál es el foco principal de la competencia 4.2 'Analíticas y evidencias de aprendizaje'?",o:["Diseñar y programar algoritmos de aprendizaje automático que complementen la intervención pedagógica del profesorado.","Gestionar el ciclo de vida de la evidencia digital generada por el alumnado, desde su generación y almacenamiento hasta su selección, análisis e interpretación.","Configurar sistemas de gestión de aprendizaje para maximizar la cantidad de datos recogidos.","Garantizar el cumplimiento de la normativa de protección de datos y la salvaguarda de la privacidad."],a:1},
    {q:"¿Cuál de las siguientes situaciones ilustra mejor un uso PRESCRIPTIVO del análisis de datos educativos?",o:["Un sistema que, tras predecir qué estudiantes tienen alto riesgo de abandono, sugiere al profesorado las intervenciones pedagógicas más adecuadas para reducir ese riesgo.","Un panel que muestra, con visualizaciones avanzadas, las medias de las calificaciones por grupo y asignatura.","Un informe que describe qué perfiles de interacción con la plataforma se han asociado históricamente al éxito académico.","Un modelo que estima la probabilidad de suspenso de cada estudiante a partir de sus calificaciones y asistencias previas."],a:0},
    {q:"¿Cuál es la secuencia correcta de las fases del ciclo de las Analíticas de Aprendizaje propuesto por Doug Clow?",o:["Aprendices (generan datos) → Datos (se recopilan y analizan) → Métricas/conocimiento (patrones y modelos) → Intervención (acciones pedagógicas que generan nuevos datos).","Aprendices (reciben retroalimentación) → Intervención (se modifica el currículo) → Datos (se procesan) → Métricas (se escogen).","Intervención (acciones colegiadas) → Métricas (se seleccionan indicadores) → Aprendices (se clasifican) → Datos (se almacenan para su tratamiento).","Datos (se recopilan) → Aprendices (interpretan los resultados) → Intervención (se recogen opiniones) → Métricas (se calculan estadísticas finales)."],a:0},
  ],
  "Unidad 2": [
    {q:"En el ejemplo de EDM para la detección temprana del fracaso escolar, ¿qué característica es esencial para el modelo predictivo? (U2)",o:["Se apoya en un análisis estadístico a partir de observaciones del tutor, sin modelos computacionales.","Rechaza cualquier tipo de transformación de datos, puesto que las variables deben utilizarse exactamente en el formato en que fueron recogidas.","Se basa en información recogida del profesorado y su opinión sobre el alumnado sin recurrir a registros históricos cuantitativos.","Integra datos procedentes de múltiples fuentes (calificaciones, asistencia, datos socioeconómicos, trazas del aula virtual) tras un preprocesamiento riguroso para identificar patrones asociados al abandono."],a:3},
    {q:"¿Cuál de las siguientes afirmaciones describe mejor la aportación específica de la Ciencia de Datos Educativos (EDS)? (U2)",o:["Aplica técnicas de minería de datos al contexto educativo, con la ventaja de no necesitar teoría pedagógica explícita.","Integra tecnología, pedagogía y ética para extraer conocimiento accionable de los datos educativos y transformar ese conocimiento en decisiones que mejoren la enseñanza y el aprendizaje.","Se centra en automatizar decisiones sobre el alumnado, reduciendo la carga de trabajo del profesorado que pasa a supervisión técnica.","Tiene como finalidad principal sustituir los métodos tradicionales de evaluación por sistemas algorítmicos más fiables."],a:1},
    {q:"En el proceso KDD, ¿qué actividades pertenecen íntegramente a la fase de preprocesamiento? (U2)",o:["Selección de técnicas y algoritmos, entrenamiento y visualización de resultados.","Selección de analíticas, informe y visualización de resultados.","Limpieza de datos, integración de datos, selección de datos y transformación de datos.","Anonimización, integridad, análisis descriptivo y predictivo."],a:2},
    {q:"¿Cuál de las siguientes afirmaciones refleja mejor el concepto de huella digital en educación? (U2)",o:["La huella digital en educación se compone de calificaciones y resultados de pruebas estandarizadas y otra información de interacción con recursos digitales de aprendizaje.","La huella digital se compone de datos demográficos y socioeconómicos del alumnado, almacenados en sistemas de gestión de información institucionales.","La huella digital incluye datos biométricos y de análisis de sentimiento, con gran potencial para los procesos analíticos educativos.","La huella digital es el rastro de datos que deja la actividad del individuo en entornos tecnológicos, cuya acumulación masiva posibilita el uso de técnicas de IA y ciencia de datos para obtener información."],a:3},
    {q:"¿Qué rasgo clave define el enfoque Data-Driven de Chris Anderson? (U2)",o:["La idea de que el Big Data solo es útil en ciencias experimentales y no resulta aplicable a contextos humanistas.","La defensa de que la correlación puede reemplazar a la causalidad, prescindiendo de marcos teóricos previos gracias a la disponibilidad masiva de datos.","La afirmación de que los modelos teóricos son imprescindibles incluso cuando se dispone de grandes volúmenes de datos y alta capacidad computacional.","La propuesta de que las Analíticas de Aprendizaje deben basarse exclusivamente en métodos cualitativos y no en datos masivos."],a:1},

let state = { unit: null, questions: [], idx: 0, score: 0, answered: false, selected: -1 };

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + id).classList.add('active');
}

function buildMenu() {
  const list = document.getElementById('unit-list');
  list.innerHTML = '';
  Object.entries(UNIT_META).forEach(([unit, meta]) => {
    const count = ALL_QUESTIONS[unit].length;
    const btn = document.createElement('button');
    btn.className = 'unit-btn';
    btn.innerHTML = `
      <div class="unit-pill" style="background:${meta.gradient}"></div>
      <div class="unit-info">
        <div class="unit-name">${unit}</div>
        <div class="unit-sub">${meta.sub}</div>
      </div>
      <span class="unit-count">${count} preg.</span>
      <span class="unit-arrow">→</span>
    `;
    btn.onclick = () => startQuiz(unit);
    list.appendChild(btn);
  });
}

function startQuiz(unit) {
  state.unit = unit;
  let pool = unit === 'Todas'
    ? Object.values(ALL_QUESTIONS).flat()
    : ALL_QUESTIONS[unit];
  state.questions = shuffle(pool);
  state.idx = 0;
  state.score = 0;
  state.answered = false;
  state.selected = -1;
  showScreen('quiz');
  renderQuestion();
}

function renderQuestion() {
  const q = state.questions[state.idx];
  const meta = state.unit === 'Todas' ? { color:'#10b981', gradient:'linear-gradient(135deg,#10b981,#06b6d4)' } : UNIT_META[state.unit];
  const total = state.questions.length;

  const tag = document.getElementById('quiz-tag');
  tag.textContent = state.unit;
  tag.style.background = meta.gradient;
  tag.style.color = '#fff';

  document.getElementById('quiz-counter').textContent = `${state.idx + 1} / ${total}`;

  const pct = (state.idx / total) * 100;
  const fill = document.getElementById('progress-fill');
  fill.style.background = meta.gradient;
  fill.style.width = pct + '%';

  document.getElementById('score-chip').textContent = `${state.score} correctas`;
  document.getElementById('question-text').textContent = q.q;

  const opts = document.getElementById('options');
  opts.innerHTML = '';
  const letters = ['A','B','C','D'];
  q.o.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'opt-btn';
    btn.style.animationDelay = (i * 0.05) + 's';
    btn.innerHTML = `<span class="opt-letter">${letters[i]}</span><span class="opt-text">${opt}</span>`;
    btn.onclick = () => selectAnswer(i);
    opts.appendChild(btn);
  });

  document.getElementById('feedback').innerHTML = '';
  const nb = document.getElementById('next-btn');
  nb.style.display = 'none';
  nb.style.background = meta.gradient;

  state.answered = false;
  state.selected = -1;
}

function selectAnswer(i) {
  if (state.answered) return;
  state.answered = true;
  state.selected = i;
  const q = state.questions[state.idx];
  const correct = q.a;
  const isRight = i === correct;
  if (isRight) state.score++;

  document.getElementById('score-chip').textContent = `${state.score} correctas`;

  const btns = document.querySelectorAll('.opt-btn');
  btns.forEach((btn, idx) => {
    btn.classList.add('disabled');
    if (idx === correct) {
      btn.classList.add('correct');
    } else if (idx === i && !isRight) {
      btn.classList.add('wrong');
    } else {
      btn.classList.add('faded');
    }
  });

  const fb = document.getElementById('feedback');
  if (isRight) {
    fb.innerHTML = `<div class="feedback-box ok"><span class="feedback-icon">🎉</span><span>¡Correcto!</span></div>`;
  } else {
    fb.innerHTML = `<div class="feedback-box fail"><span class="feedback-icon">💡</span><span>Incorrecto. La respuesta correcta es: <strong>${q.o[correct]}</strong></span></div>`;
  }

  const nb = document.getElementById('next-btn');
  nb.style.display = 'block';
  nb.textContent = state.idx + 1 >= state.questions.length ? 'Ver resultados' : 'Siguiente →';

  const total = state.questions.length;
  const pct = ((state.idx + 1) / total) * 100;
  document.getElementById('progress-fill').style.width = pct + '%';
}

function nextQuestion() {
  if (state.idx + 1 >= state.questions.length) {
    showResults();
  } else {
    state.idx++;
    renderQuestion();
  }
}

function showResults() {
  showScreen('results');
  const pct = Math.round((state.score / state.questions.length) * 100);
  const meta = state.unit === 'Todas' ? { color:'#10b981', gradient:'linear-gradient(135deg,#10b981,#06b6d4)' } : UNIT_META[state.unit];

  const emoji = pct >= 80 ? '🏆' : pct >= 60 ? '👍' : pct >= 40 ? '📚' : '💪';
  const msg   = pct >= 80 ? '¡Excelente dominio!' : pct >= 60 ? '¡Buen trabajo!' : pct >= 40 ? 'Sigue practicando' : '¡A estudiar más!';

  document.getElementById('res-emoji').textContent = emoji;
  document.getElementById('res-title').textContent = msg;
  document.getElementById('res-sub').textContent = `${state.unit} · ${state.questions.length} preguntas`;
  document.getElementById('res-pct').textContent = pct + '%';
  document.getElementById('res-pct').style.background = meta.gradient;
  document.getElementById('res-pct').style.webkitBackgroundClip = 'text';
  document.getElementById('res-pct').style.webkitTextFillColor = 'transparent';
  document.getElementById('res-score').textContent = `${state.score} de ${state.questions.length} correctas`;

  const bar = document.getElementById('res-bar');
  bar.style.background = meta.gradient;
  setTimeout(() => { bar.style.width = pct + '%'; }, 100);

  const rb = document.getElementById('replay-btn');
  rb.style.background = meta.gradient;
}

function replayQuiz() { startQuiz(state.unit); }
function goMenu() { showScreen('menu'); }

buildMenu();
</script>
</body>
</html>
