<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Realidad Virtual y Entornos Inmersivos — Test</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #080b12;
    --surface: #0f1420;
    --surface2: #161d2e;
    --border: #1e2a40;
    --text: #e8edf5;
    --muted: #5a6a85;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 50% at 20% 20%, rgba(251,113,133,0.07) 0%, transparent 70%),
      radial-gradient(ellipse 50% 40% at 80% 80%, rgba(167,139,250,0.07) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }
  .wrap {
    position: relative;
    z-index: 1;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 2rem 1rem;
  }
  #screen-menu { width: 100%; max-width: 520px; }
  .logo-block {
    text-align: center;
    margin-bottom: 2.5rem;
    animation: fadeDown .5s ease both;
  }
  .logo-icon {
    width: 64px; height: 64px;
    background: linear-gradient(135deg, #f43f5e, #a855f7);
    border-radius: 18px;
    display: inline-flex; align-items: center; justify-content: center;
    font-size: 2rem;
    margin-bottom: 1rem;
    box-shadow: 0 0 40px rgba(244,63,94,0.25);
  }
  .logo-block h1 {
    font-family: 'Syne', sans-serif;
    font-size: 1.6rem;
    font-weight: 800;
    letter-spacing: -0.02em;
    color: #fff;
  }
  .logo-block p { color: var(--muted); font-size: .85rem; margin-top: .4rem; }
  .unit-list { display: flex; flex-direction: column; gap: .6rem; margin-bottom: 1rem; }
  .unit-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: .9rem 1.1rem;
    cursor: pointer;
    display: flex; align-items: center; gap: .9rem;
    transition: border-color .2s, transform .15s, background .2s;
    animation: fadeUp .4s ease both;
    text-align: left; width: 100%;
  }
  .unit-btn:hover { border-color: #2d3f60; background: var(--surface2); transform: translateY(-1px); }
  .unit-btn:active { transform: scale(.99); }
  .unit-pill { width: 4px; min-width: 4px; height: 40px; border-radius: 99px; }
  .unit-info { flex: 1; min-width: 0; }
  .unit-name { font-family: 'Syne', sans-serif; font-size: .9rem; font-weight: 700; color: #fff; }
  .unit-sub { font-size: .75rem; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: .15rem; }
  .unit-count { font-size: .75rem; color: var(--muted); white-space: nowrap; }
  .unit-arrow { color: var(--muted); font-size: 1rem; }
  .mega-btn {
    width: 100%;
    padding: 1.1rem 1.4rem;
    border-radius: 16px;
    border: none;
    cursor: pointer;
    font-family: 'Syne', sans-serif;
    font-size: 1rem; font-weight: 700;
    color: #fff;
    background: linear-gradient(135deg, #f43f5e 0%, #a855f7 100%);
    box-shadow: 0 8px 30px rgba(244,63,94,0.28);
    display: flex; align-items: center; justify-content: space-between;
    transition: opacity .2s, transform .15s;
    animation: fadeUp .4s .35s ease both;
  }
  .mega-btn:hover { opacity: .92; transform: translateY(-1px); }
  .mega-btn:active { transform: scale(.99); }
  .mega-left { display: flex; align-items: center; gap: .75rem; }
  .mega-left span:first-child { font-size: 1.4rem; }
  .mega-title { font-size: 1rem; }
  .mega-sub { font-size: .75rem; font-weight: 400; opacity: .75; }
  #screen-quiz { width: 100%; max-width: 520px; }
  .quiz-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 1rem;
    animation: fadeDown .3s ease both;
  }
  .back-btn {
    background: none; border: 1px solid var(--border);
    border-radius: 8px; padding: .4rem .8rem;
    color: var(--muted); font-size: .8rem; cursor: pointer;
    transition: color .15s, border-color .15s;
    font-family: 'DM Sans', sans-serif;
  }
  .back-btn:hover { color: var(--text); border-color: #2d3f60; }
  .unit-tag { font-size: .7rem; font-weight: 600; padding: .3rem .7rem; border-radius: 99px; letter-spacing: .05em; }
  .counter { font-size: .8rem; color: var(--muted); }
  .progress-bar {
    height: 3px; background: var(--border); border-radius: 99px;
    margin-bottom: 1.2rem; overflow: hidden;
    animation: fadeDown .3s .1s ease both;
  }
  .progress-fill { height: 100%; border-radius: 99px; transition: width .5s cubic-bezier(.4,0,.2,1); }
  .score-chip {
    display: inline-flex; align-items: center; gap: .4rem;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 99px; padding: .3rem .8rem;
    font-size: .8rem; color: var(--text);
    margin-bottom: 1.2rem;
    animation: fadeDown .3s .15s ease both;
  }
  .score-chip .star { color: #f59e0b; }
  .question-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 18px; padding: 1.4rem; margin-bottom: 1.1rem;
    animation: fadeUp .3s .1s ease both;
  }
  .question-card p { font-size: .97rem; line-height: 1.6; color: var(--text); }
  .options { display: flex; flex-direction: column; gap: .55rem; margin-bottom: 1.2rem; }
  .opt-btn {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: .9rem 1rem;
    cursor: pointer;
    display: flex; align-items: center; gap: .75rem;
    transition: border-color .15s, background .15s, transform .1s;
    text-align: left; width: 100%;
    animation: fadeUp .3s ease both;
  }
  .opt-btn:hover:not(.disabled) { border-color: #2d3f60; background: var(--surface2); transform: translateY(-1px); }
  .opt-btn:active:not(.disabled) { transform: scale(.99); }
  .opt-btn.disabled { cursor: default; }
  .opt-btn.correct { background: rgba(16,185,129,0.12); border-color: #10b981; }
  .opt-btn.wrong { background: rgba(239,68,68,0.1); border-color: #ef4444; }
  .opt-btn.faded { opacity: .4; }
  .opt-letter {
    width: 28px; height: 28px; min-width: 28px;
    border-radius: 50%; border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-size: .75rem; font-family: 'Syne', sans-serif; font-weight: 700;
    color: var(--muted);
    transition: background .2s, border-color .2s, color .2s;
  }
  .opt-btn.correct .opt-letter { background: #10b981; border-color: #10b981; color: #fff; }
  .opt-btn.wrong .opt-letter { background: #ef4444; border-color: #ef4444; color: #fff; }
  .opt-text { font-size: .85rem; line-height: 1.4; color: var(--text); }
  .opt-btn.faded .opt-text { color: var(--muted); }
  .feedback-box {
    border-radius: 12px; padding: .8rem 1rem;
    display: flex; align-items: flex-start; gap: .6rem;
    font-size: .85rem; line-height: 1.4;
    animation: fadeUp .2s ease both; margin-bottom: .8rem;
  }
  .feedback-box.ok { background: rgba(16,185,129,0.1); border: 1px solid rgba(16,185,129,0.3); color: #6ee7b7; }
  .feedback-box.fail { background: rgba(239,68,68,0.08); border: 1px solid rgba(239,68,68,0.3); color: #fca5a5; }
  .feedback-icon { font-size: 1rem; flex-shrink: 0; }
  .next-btn {
    width: 100%; padding: .9rem; border-radius: 12px; border: none; cursor: pointer;
    font-family: 'Syne', sans-serif; font-size: .95rem; font-weight: 700; color: #fff;
    transition: opacity .2s, transform .1s;
    animation: fadeUp .25s ease both;
  }
  .next-btn:hover { opacity: .88; }
  .next-btn:active { transform: scale(.99); }
  #screen-results { width: 100%; max-width: 420px; text-align: center; }
  .result-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 24px; padding: 2.5rem 2rem; margin-bottom: 1.2rem;
    animation: fadeUp .4s ease both;
  }
  .result-emoji { font-size: 3.5rem; margin-bottom: 1rem; }
  .result-title { font-family: 'Syne', sans-serif; font-size: 1.4rem; font-weight: 800; color: #fff; margin-bottom: .3rem; }
  .result-sub { font-size: .82rem; color: var(--muted); margin-bottom: 1.5rem; }
  .result-pct { font-family: 'Syne', sans-serif; font-size: 5rem; font-weight: 800; line-height: 1; margin-bottom: .3rem; }
  .result-score { font-size: .85rem; color: var(--muted); margin-bottom: 1.5rem; }
  .result-bar { height: 8px; background: var(--border); border-radius: 99px; overflow: hidden; }
  .result-bar-fill { height: 100%; border-radius: 99px; transition: width 1s cubic-bezier(.4,0,.2,1); }
  .result-actions { display: flex; flex-direction: column; gap: .7rem; animation: fadeUp .4s .1s ease both; }
  .btn-outline {
    background: var(--surface); border: 1px solid var(--border); color: var(--text);
    padding: .9rem; border-radius: 12px; cursor: pointer;
    font-family: 'Syne', sans-serif; font-size: .9rem; font-weight: 700;
    transition: background .15s, border-color .15s;
  }
  .btn-outline:hover { background: var(--surface2); border-color: #2d3f60; }
  .screen { display: none; }
  .screen.active { display: block; }
  @keyframes fadeDown { from { opacity: 0; transform: translateY(-12px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: translateY(0); } }
  .unit-btn:nth-child(1){animation-delay:.05s}.unit-btn:nth-child(2){animation-delay:.10s}
  .unit-btn:nth-child(3){animation-delay:.15s}.unit-btn:nth-child(4){animation-delay:.20s}
  .unit-btn:nth-child(5){animation-delay:.25s}.unit-btn:nth-child(6){animation-delay:.30s}
  .opt-btn:nth-child(1){animation-delay:.05s}.opt-btn:nth-child(2){animation-delay:.10s}
  .opt-btn:nth-child(3){animation-delay:.15s}.opt-btn:nth-child(4){animation-delay:.20s}
</style>
</head>
<body>
<div class="wrap">

  <div id="screen-menu" class="screen active">
    <div class="logo-block">
      <div class="logo-icon">🥽</div>
      <h1>Realidad Virtual y Entornos Inmersivos</h1>
      <p>Elige un tema para practicar o pon a prueba todos los contenidos</p>
    </div>
    <div class="unit-list" id="unit-list"></div>
    <button class="mega-btn" onclick="startQuiz('Todos')">
      <div class="mega-left">
        <span>⚡</span>
        <div>
          <div class="mega-title">Test Completo</div>
          <div class="mega-sub">119 preguntas · Todos los temas</div>
        </div>
      </div>
      <span>→</span>
    </button>
  </div>

  <div id="screen-quiz" class="screen">
    <div class="quiz-header">
      <button class="back-btn" onclick="goMenu()">← Menú</button>
      <span class="unit-tag" id="quiz-tag"></span>
      <span class="counter" id="quiz-counter"></span>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
    <div class="score-chip"><span class="star">★</span> <span id="score-chip">0 correctas</span></div>
    <div class="question-card"><p id="question-text"></p></div>
    <div class="options" id="options"></div>
    <div id="feedback"></div>
    <button class="next-btn" id="next-btn" style="display:none" onclick="nextQuestion()"></button>
  </div>

  <div id="screen-results" class="screen">
    <div class="result-card">
      <div class="result-emoji" id="res-emoji"></div>
      <div class="result-title" id="res-title"></div>
      <div class="result-sub" id="res-sub"></div>
      <div class="result-pct" id="res-pct"></div>
      <div class="result-score" id="res-score"></div>
      <div class="result-bar"><div class="result-bar-fill" id="res-bar"></div></div>
    </div>
    <div class="result-actions">
      <button class="next-btn" id="replay-btn" onclick="replayQuiz()">🔄 Repetir este test</button>
      <button class="btn-outline" onclick="goMenu()">← Volver al menú principal</button>
    </div>
  </div>

</div>

<script>
const ALL_QUESTIONS = {
  "Tema 1": [
    {q:"¿Qué permite la Realidad Virtual (RV) al usuario?",o:["Comunicarse con otros usuarios a través de redes sociales.","Interactuar con entornos tridimensionales generados por ordenador.","Usar únicamente pantallas bidimensionales.","Acceder a información textual sin imágenes."],a:1},
    {q:"¿Cuál es el principal aporte de la Realidad Virtual en el ámbito educativo?",o:["Sustituir por completo al docente en el proceso de enseñanza.","Facilitar el aprendizaje memorístico y repetitivo.","Transformar la manera en que los estudiantes interactúan con el conocimiento.","Reemplazar los libros de texto físicos por digitales."],a:2},
    {q:"¿Qué efecto tiene la Realidad Virtual Inmersiva (RVI) en los estudiantes?",o:["Disminuye la atención y el compromiso cognitivo.","Aumenta el compromiso emocional y cognitivo.","Provoca distracciones en el aula.","Reduce el interés por los contenidos científicos."],a:1},
    {q:"¿Qué tres elementos son fundamentales para que se dé una experiencia de Realidad Virtual?",o:["Realismo gráfico, conectividad y hardware.","Simulación interactiva, interacción implícita e inmersión sensorial.","Sonido, vídeo y movimiento.","Gafas 3D, ordenador y conexión a internet."],a:1},
    {q:"¿Qué diferencia a la Realidad Virtual de otras tecnologías digitales?",o:["Que se utiliza solo para videojuegos.","Que se limita a reproducir videos educativos.","Que genera una sensación de presencia dentro del entorno digital.","Que no requiere de ningún dispositivo adicional."],a:2},
    {q:"¿Qué papel desempeña la Inteligencia Artificial (IA) en la Realidad Virtual?",o:["Permite crear entornos 3D y personajes de forma más eficaz y rápida.","Sustituye al estudiante durante la práctica educativa.","Limita la capacidad de inmersión del usuario.","Evita la interacción con los objetos virtuales."],a:0},
    {q:"¿Qué tecnología combina elementos reales y virtuales que interactúan entre sí?",o:["Realidad Virtual (VR).","Realidad Aumentada (AR).","Realidad Mixta (MR).","Realidad Extendida (XR)."],a:2},
    {q:"¿En qué campo se utiliza la Realidad Virtual para el tratamiento de fobias y manejo del dolor?",o:["Ingeniería.","Medicina veterinaria.","Psicología.","Arquitectura."],a:2},
    {q:"¿Qué son los gráficos CGI?",o:["Fotografías tomadas con cámara 360º.","Imágenes creadas mediante software y algoritmos informáticos.","Vídeos grabados con dron.","Escenarios reales adaptados a la RV."],a:1},
    {q:"¿Qué aporta la Inteligencia Artificial a los vídeos 360º en términos de accesibilidad?",o:["Mejora el color y la resolución.","Permite generar subtítulos automáticos y traducciones.","Aumenta la duración del vídeo.","Reduce la interactividad."],a:1},
    {q:"¿Qué se entiende por Realidad Extendida (XR) según Weinstein (2022)?",o:["Una tecnología exclusiva de los videojuegos.","La sustitución total del mundo real por uno virtual.","El conjunto de la realidad virtual, aumentada y mixta.","Una evolución únicamente de la realidad aumentada."],a:2},
    {q:"¿Cuál es el objetivo principal de la Realidad Extendida?",o:["Vídeos en 360º.","Combinar las realidades físicas y virtuales hasta que sean indistinguibles.","Sustituir el uso del ordenador tradicional.","Crear únicamente simuladores educativos."],a:1},
    {q:"¿A quién se le atribuye el término 'Realidad Virtual'?",o:["Weinstein (2022).","Sherman y Craig (2002).","Lanier, J. (1980).","Slater y Wilbur (1997)."],a:2},
    {q:"¿Qué caracteriza a la Realidad Virtual Inmersiva?",o:["Se visualiza únicamente en pantallas planas.","No requiere dispositivos adicionales.","Aísla al usuario del mundo real y lo introduce en un entorno 3D interactivo.","Solo permite observar sin interactuar."],a:2},
    {q:"¿Qué tipo de Realidad Virtual se basa en el uso de pantallas de ordenador o móvil sin dispositivos especiales?",o:["Realidad Virtual Inmersiva.","Realidad Virtual Mixta.","Realidad Virtual No Inmersiva.","Realidad Virtual Extendida."],a:2},
    {q:"¿Cuál es un ejemplo típico de Realidad Virtual Semi Inmersiva?",o:["Un videojuego en un ordenador personal.","Un visor VR con guantes hápticos.","Un simulador de vuelo con cabina física y pantallas.","Un vídeo educativo en 2D."],a:2},
    {q:"Según Sherman y Craig (2002), ¿cuál de los siguientes NO es uno de los elementos básicos de la RV inmersiva?",o:["Inmersión completa.","Retroalimentación sensorial.","Interactividad.","Conectividad a internet."],a:3},
    {q:"¿Qué dispositivo histórico es considerado un precursor de la realidad virtual multisensorial?",o:["Google Cardboard.","Oculus Rift.","Sensorama de Morton Heilig.","Virtual Boy."],a:2},
    {q:"¿Qué función cumple el giroscopio en las gafas de realidad virtual?",o:["Medir el campo magnético.","Detectar la rotación de la cabeza.","Equilibrar la orientación de la pantalla.","Registrar el movimiento de las manos."],a:1},
    {q:"¿Cuál es uno de los principales beneficios educativos del uso de simuladores de realidad virtual?",o:["Favorecer el aprendizaje memorístico.","Eliminar la necesidad del docente.","Permitir el aprendizaje experiencial en entornos seguros.","Sustituir completamente las prácticas reales."],a:2},
  ],
  "Tema 2": [
    {q:"¿Qué diferencia principal existe entre la Realidad Aumentada (RA) y la Realidad Virtual (RV)?",o:["La RA crea un entorno completamente simulado.","La RA reemplaza totalmente la realidad física.","La RA enriquece el mundo real superponiendo elementos digitales.","La RA se utiliza solo con gafas especiales."],a:2},
    {q:"¿Cuál es una de las principales ventajas educativas de la Realidad Aumentada?",o:["Sustituye la enseñanza tradicional.","Favorece el aprendizaje significativo mediante la interacción con contenidos digitales.","Requiere infraestructura compleja y costosa.","Se limita a materias tecnológicas."],a:1},
    {q:"Según Azuma (1997), ¿cuáles son las tres características básicas de la Realidad Aumentada?",o:["Realismo gráfico, sonido envolvente y conexión a internet.","Interacción en tiempo real, combinación de lo real y lo virtual, y registro en 3D.","Realidad simulada, inmersión total y control por voz.","Visualización 2D, animación y realidad extendida."],a:1},
    {q:"¿Qué elemento actúa como activador de la Realidad Aumentada?",o:["Un micrófono.","Un marcador o código QR.","Un mando de control.","Una pantalla táctil."],a:1},
    {q:"¿Qué videojuego popular de 2016 marcó un hito en el uso masivo de la RA?",o:["Fortnite.","Pokémon GO.","Minecraft.","Angry Birds."],a:1},
    {q:"¿Qué función cumple la Inteligencia Artificial cuando se integra con la Realidad Aumentada?",o:["Permitir la creación de modelos 3D más pesados.","Facilitar el reconocimiento de objetos y la interacción inteligente.","Reducir la calidad visual de los modelos aumentados.","Limitar la autonomía del usuario en el entorno aumentado."],a:1},
    {q:"¿Qué caracteriza a la Realidad Aumentada basada en marcadores?",o:["Utiliza sensores y GPS para determinar la posición del usuario.","Superpone información al detectar un marcador impreso o código QR.","Requiere conexión a Internet para funcionar.","Solo se utiliza en entornos industriales."],a:1},
    {q:"¿Cuál es un ejemplo de RA basada en localización?",o:["Quiver AR.","Google Maps Live View.","Ikea Place.","Lens Studio."],a:1},
    {q:"¿Qué aplicaciones populares emplean RA basada en reconocimiento facial?",o:["Google Earth y Live View.","Snapchat e Instagram.","Quiver y Merge Cube.","Arloopa y MyWebAR."],a:1},
    {q:"¿Qué tipo de RA ofrece Google AR&VR (AR Code)?",o:["RA basada en marcadores.","RA sin marcadores.","RA basada en proyección.","RA facial."],a:1},
    {q:"Según Espinosa (2015), ¿por qué se establecen niveles o grados de Realidad Aumentada?",o:["Para clasificar los dispositivos móviles.","Para diferenciar la RA de la Realidad Virtual.","Porque la RA puede variar en complejidad e integración con el mundo real.","Para limitar su uso educativo."],a:2},
    {q:"¿Qué caracteriza a la Tecnología de nivel 0 en Realidad Aumentada?",o:["El uso de gafas inteligentes.","La superposición de objetos 3D complejos.","El uso de hiperenlaces mediante códigos QR en el mundo físico.","La geolocalización avanzada."],a:2},
    {q:"¿Qué tipo de contenidos puede ofrecer un código QR en RA de nivel 0?",o:["Únicamente textos planos.","Solo imágenes en 2D.","Acceso a páginas web, vídeos, PDF o audios.","Exclusivamente modelos 3D interactivos."],a:2},
    {q:"¿Qué elemento define la Tecnología de nivel 1 en Realidad Aumentada?",o:["El uso del GPS y la brújula.","La utilización de marcadores impresos que activan contenidos 3D.","La inmersión total del usuario.","La navegación web sin aplicaciones."],a:1},
    {q:"¿Qué ocurre al escanear un marcador en la RA de nivel 1?",o:["Se abre un enlace web.","Se descarga una aplicación.","Se superpone un contenido virtual sobre la imagen real.","Se activa la geolocalización del dispositivo."],a:2},
    {q:"¿Qué tecnología se emplea principalmente en la Realidad Aumentada de nivel 2?",o:["Códigos QR.","Marcadores geométricos.","GPS, brújula y sensores del dispositivo móvil.","Gafas de realidad aumentada."],a:2},
    {q:"¿Qué caracteriza a la Tecnología de nivel 3 o Visión Aumentada?",o:["El uso exclusivo de smartphones.","La visualización mediante códigos impresos.","El empleo de gafas o lentillas biónicas para una experiencia inmersiva total.","La navegación web desde el navegador."],a:2},
    {q:"¿Cuál de las siguientes afirmaciones es correcta sobre la implementación de la RA basada en marcadores en móviles?",o:["Requiere hardware de alta gama.","Necesita sensores avanzados y alto procesamiento.","Es sencilla y funciona en la mayoría de dispositivos actuales.","Solo funciona en sistemas iOS."],a:2},
    {q:"¿Qué ventaja principal ofrece la WebAR frente a las aplicaciones nativas de RA?",o:["Mayor calidad gráfica.","Necesidad de instalar aplicaciones específicas.","Funcionamiento directo desde el navegador sin instalar apps.","Uso exclusivo en ordenadores."],a:2},
    {q:"¿Qué es MyWebAR?",o:["Una herramienta que sustituye completamente al profesorado.","Un dispositivo que se usa para RV.","Una plataforma no-code que permite crear experiencias de RA en minutos.","Una aplicación RA que necesita programación del usuario."],a:2},

  "Tema 1": { gradient:"linear-gradient(135deg,#f43f5e,#fb7185)", sub:"Fundamentos, tipos y dispositivos de RV" },
  "Tema 2": { gradient:"linear-gradient(135deg,#a855f7,#c084fc)", sub:"Realidad Aumentada: niveles y tecnologías" },
  "Tema 3": { gradient:"linear-gradient(135deg,#3b82f6,#60a5fa)", sub:"Herramientas, IA generativa y exploración inmersiva" },
  "Tema 4": { gradient:"linear-gradient(135deg,#f97316,#fb923c)", sub:"Diseño pedagógico y ABP con RV/RA" },
  "Tema 5": { gradient:"linear-gradient(135deg,#10b981,#34d399)", sub:"Plataformas, mundos virtuales y creación 3D" },
  "Tema 6": { gradient:"linear-gradient(135deg,#eab308,#fbbf24)", sub:"Pedagogía inmersiva, objetivos y evaluación" },
};

let state = { unit: null, questions: [], idx: 0, score: 0, answered: false, selected: -1 };

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + id).classList.add('active');
}

function buildMenu() {
  const list = document.getElementById('unit-list');
  list.innerHTML = '';
  Object.entries(UNIT_META).forEach(([unit, meta]) => {
    const count = ALL_QUESTIONS[unit].length;
    const btn = document.createElement('button');
    btn.className = 'unit-btn';
    btn.innerHTML = `
      <div class="unit-pill" style="background:${meta.gradient}"></div>
      <div class="unit-info">
        <div class="unit-name">${unit}</div>
        <div class="unit-sub">${meta.sub}</div>
      </div>
      <span class="unit-count">${count} preg.</span>
      <span class="unit-arrow">→</span>
    `;
    btn.onclick = () => startQuiz(unit);
    list.appendChild(btn);
  });
}

function startQuiz(unit) {
  state.unit = unit;
  let pool = unit === 'Todos' ? Object.values(ALL_QUESTIONS).flat() : ALL_QUESTIONS[unit];
  state.questions = shuffle(pool);
  state.idx = 0; state.score = 0; state.answered = false; state.selected = -1;
  showScreen('quiz');
  renderQuestion();
}

function renderQuestion() {
  const q = state.questions[state.idx];
  const meta = state.unit === 'Todos' ? { gradient:'linear-gradient(135deg,#f43f5e,#a855f7)' } : UNIT_META[state.unit];
  const total = state.questions.length;

  const tag = document.getElementById('quiz-tag');
  tag.textContent = state.unit;
  tag.style.background = meta.gradient;
  tag.style.color = '#fff';

  document.getElementById('quiz-counter').textContent = `${state.idx + 1} / ${total}`;

  const fill = document.getElementById('progress-fill');
  fill.style.background = meta.gradient;
  fill.style.width = (state.idx / total * 100) + '%';

  document.getElementById('score-chip').textContent = `${state.score} correctas`;
  document.getElementById('question-text').textContent = q.q;

  const opts = document.getElementById('options');
  opts.innerHTML = '';
  ['A','B','C','D'].forEach((l, i) => {
    const btn = document.createElement('button');
    btn.className = 'opt-btn';
    btn.style.animationDelay = (i * 0.05) + 's';
    btn.innerHTML = `<span class="opt-letter">${l}</span><span class="opt-text">${q.o[i]}</span>`;
    btn.onclick = () => selectAnswer(i);
    opts.appendChild(btn);
  });

  document.getElementById('feedback').innerHTML = '';
  const nb = document.getElementById('next-btn');
  nb.style.display = 'none';
  nb.style.background = meta.gradient;
  state.answered = false; state.selected = -1;
}

function selectAnswer(i) {
  if (state.answered) return;
  state.answered = true; state.selected = i;
  const q = state.questions[state.idx];
  const correct = q.a;
  const isRight = i === correct;
  if (isRight) state.score++;

  document.getElementById('score-chip').textContent = `${state.score} correctas`;

  document.querySelectorAll('.opt-btn').forEach((btn, idx) => {
    btn.classList.add('disabled');
    if (idx === correct) btn.classList.add('correct');
    else if (idx === i && !isRight) btn.classList.add('wrong');
    else btn.classList.add('faded');
  });

  const fb = document.getElementById('feedback');
  fb.innerHTML = isRight
    ? `<div class="feedback-box ok"><span class="feedback-icon">🎉</span><span>¡Correcto!</span></div>`
    : `<div class="feedback-box fail"><span class="feedback-icon">💡</span><span>Incorrecto. La respuesta correcta es: <strong>${q.o[correct]}</strong></span></div>`;

  const nb = document.getElementById('next-btn');
  nb.style.display = 'block';
  nb.textContent = state.idx + 1 >= state.questions.length ? 'Ver resultados' : 'Siguiente →';
  document.getElementById('progress-fill').style.width = ((state.idx + 1) / state.questions.length * 100) + '%';
}

function nextQuestion() {
  if (state.idx + 1 >= state.questions.length) showResults();
  else { state.idx++; renderQuestion(); }
}

function showResults() {
  showScreen('results');
  const pct = Math.round(state.score / state.questions.length * 100);
  const meta = state.unit === 'Todos' ? { gradient:'linear-gradient(135deg,#f43f5e,#a855f7)' } : UNIT_META[state.unit];
  const emoji = pct >= 80 ? '🏆' : pct >= 60 ? '👍' : pct >= 40 ? '📚' : '💪';
  const msg   = pct >= 80 ? '¡Excelente dominio!' : pct >= 60 ? '¡Buen trabajo!' : pct >= 40 ? 'Sigue practicando' : '¡A estudiar más!';

  document.getElementById('res-emoji').textContent = emoji;
  document.getElementById('res-title').textContent = msg;
  document.getElementById('res-sub').textContent = `${state.unit} · ${state.questions.length} preguntas`;
  document.getElementById('res-pct').textContent = pct + '%';
  document.getElementById('res-pct').style.background = meta.gradient;
  document.getElementById('res-pct').style.webkitBackgroundClip = 'text';
  document.getElementById('res-pct').style.webkitTextFillColor = 'transparent';
  document.getElementById('res-score').textContent = `${state.score} de ${state.questions.length} correctas`;

  const bar = document.getElementById('res-bar');
  bar.style.background = meta.gradient;
  setTimeout(() => { bar.style.width = pct + '%'; }, 100);
  document.getElementById('replay-btn').style.background = meta.gradient;
}

function replayQuiz() { startQuiz(state.unit); }
function goMenu() { showScreen('menu'); }

buildMenu();
</script>
</body>
</html>
